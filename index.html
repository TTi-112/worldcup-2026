<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026™ — 球员数据</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0b0b1a;--surface:#1a1a2e;--text:#f0f0f0;--text-muted:#8888aa;--accent:#00d4ff;--gold:#ffd700;--green:#4caf50;--red:#e74c3c;--radius:12px;--shadow:0 4px 24px rgba(0,0,0,.4)}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
a{color:var(--accent);text-decoration:none}
.hero{text-align:center;padding:2.5rem 1rem 1rem;background:linear-gradient(180deg,#0f1a3a 0%,var(--bg) 100%)}
.hero h1{font-size:clamp(1.6rem,4vw,2.8rem);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero .sub{color:var(--text-muted);margin-top:.3rem;font-size:clamp(.85rem,2vw,1.05rem)}
.hero .source{color:var(--accent);font-size:.8rem;margin-top:.4rem}
.hero .live-dot{display:inline-block;width:8px;height:8px;background:#4caf50;border-radius:50%;margin-right:6px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.lang-toggle{position:fixed;top:1rem;right:1rem;z-index:100;display:flex;background:var(--surface);border-radius:20px;overflow:hidden;box-shadow:var(--shadow)}
.lang-btn{padding:.4rem .8rem;border:none;background:transparent;color:var(--text-muted);cursor:pointer;font-size:.8rem;font-weight:600;transition:all .2s}
.lang-btn.active{background:var(--accent);color:#000}
.tab-nav{max-width:1200px;margin:1rem auto 0;padding:0 1rem;display:flex;gap:.3rem;flex-wrap:wrap}
.tab-btn{padding:.5rem 1rem;border:1px solid #333;border-radius:var(--radius) var(--radius) 0 0;background:transparent;color:var(--text-muted);cursor:pointer;font-size:.85rem;font-weight:600;transition:all .2s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{background:var(--surface);color:var(--accent);border-bottom-color:var(--surface)}
.tab-content{display:none;max-width:1200px;margin:0 auto;padding:0 1rem 3rem}
.tab-content.active{display:block}
.stats-bar{margin:0 auto 1.5rem;display:flex;flex-wrap:wrap;gap:1rem;justify-content:center}
.stats-bar .stat-item{background:var(--surface);padding:.6rem 1rem;border-radius:var(--radius);text-align:center;min-width:100px}
.stats-bar .stat-val{font-size:1.3rem;font-weight:700;color:var(--accent)}
.stats-bar .stat-label{font-size:.7rem;color:var(--text-muted);text-transform:uppercase}
.controls{margin:0 auto 1.5rem;display:flex;flex-wrap:wrap;gap:.75rem;align-items:center}
.search-box{flex:1 1 220px;padding:.5rem .8rem;border:1px solid #333;border-radius:var(--radius);background:#12122a;color:var(--text);font-size:.9rem;outline:none}
.search-box:focus{border-color:var(--accent)}
.filter-group{display:flex;gap:.3rem;flex-wrap:wrap}
.filter-btn{padding:.4rem .8rem;border:1px solid #333;border-radius:var(--radius);background:transparent;color:var(--text-muted);cursor:pointer;font-size:.8rem;transition:all .2s}
.filter-btn:hover{border-color:#555;color:var(--text)}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:600}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:1.25rem}
.card{position:relative;background:var(--surface);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);transition:transform .25s,box-shadow .25s}
.card:hover{transform:translateY(-4px);box-shadow:0 8px 32px rgba(0,212,255,.15)}
.card::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;background:var(--card-accent,var(--accent));z-index:2}
.player-image-wrap{position:relative;width:100%;height:200px;overflow:hidden;background:linear-gradient(135deg,var(--team-color,#1a1a2e) 0%,#0a0a15 100%)}
.player-photo{position:absolute;bottom:0;left:50%;transform:translateX(-50%);height:180px;width:auto;object-fit:contain;opacity:.6;filter:drop-shadow(0 4px 12px rgba(0,0,0,.5));z-index:1;transition:opacity .3s,transform .3s}
.card:hover .player-photo{opacity:.8;transform:translateX(-50%) scale(1.05)}
.player-silhouette{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:140px;height:180px;opacity:.15;z-index:0}
.player-silhouette svg{width:100%;height:100%;fill:currentColor}
.player-number-bg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:7rem;font-weight:900;color:rgba(255,255,255,.06);line-height:1;z-index:0}
.card-flag{position:absolute;top:10px;right:10px;font-size:1.4rem;z-index:3;background:rgba(0,0,0,.5);border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center}
.rank-badge{position:absolute;top:10px;left:10px;background:rgba(0,0,0,.7);color:var(--gold);font-weight:700;font-size:.7rem;padding:.2rem .45rem;border-radius:20px;z-index:3}
.card-body{padding:.7rem 1rem .3rem;position:relative;z-index:1}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.15rem}
.player-name{font-size:1rem;font-weight:700;line-height:1.2;text-shadow:0 1px 3px rgba(0,0,0,.5)}
.player-team{font-size:.75rem;color:var(--text-muted);margin-top:1px}
.player-meta{font-size:.65rem;color:var(--text-muted)}
.goals-badge{display:inline-flex;align-items:center;gap:3px;padding:.2rem .5rem;border-radius:20px;font-size:.7rem;font-weight:700;background:rgba(231,76,60,.2);color:var(--red)}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:.4rem;padding:.5rem 1rem;border-top:1px solid rgba(255,255,255,.06)}
.stat{text-align:center}
.stat-val{font-size:.95rem;font-weight:700}
.stat-label{font-size:.55rem;color:var(--text-muted);text-transform:uppercase}
.ranking-badge{display:inline-flex;align-items:center;gap:3px;padding:.15rem .4rem;border-radius:10px;font-size:.65rem;font-weight:600}
.ranking-top10{background:rgba(255,215,0,.15);color:var(--gold)}
.ranking-top20{background:rgba(0,212,255,.1);color:var(--accent)}
.ranking-other{background:rgba(136,136,170,.1);color:var(--text-muted)}

/* Group Tables */
.group-section{margin-bottom:2rem}
.group-title{font-size:1.1rem;font-weight:700;color:var(--accent);margin-bottom:.75rem;display:flex;align-items:center;gap:.5rem}
.group-table{width:100%;border-collapse:collapse;background:var(--surface);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.group-table th{background:#12122a;padding:.6rem .8rem;text-align:left;font-size:.7rem;text-transform:uppercase;color:var(--text-muted);letter-spacing:.05em}
.group-table td{padding:.5rem .8rem;border-top:1px solid rgba(255,255,255,.04);font-size:.85rem}
.group-table tr:hover{background:rgba(255,255,255,.03)}
.group-table .team-cell{display:flex;align-items:center;gap:.5rem;font-weight:600}
.group-table .team-flag{font-size:1.1rem}
.group-table .pts{font-weight:700;color:var(--accent);font-size:1rem}
.group-table .gd-pos{color:var(--green)}
.group-table .gd-neg{color:var(--red)}

/* Schedule */
.schedule-date{margin-bottom:2rem}
.schedule-date-header{font-size:1rem;font-weight:700;color:var(--accent);margin-bottom:.75rem;padding:.5rem .8rem;background:var(--surface);border-radius:var(--radius);display:flex;align-items:center;gap:.5rem}
.schedule-date-header .date-icon{font-size:1.2rem}
.match-card{background:var(--surface);border-radius:var(--radius);padding:.8rem 1rem;margin-bottom:.5rem;box-shadow:var(--shadow);transition:transform .2s}
.match-card:hover{transform:translateX(4px)}
.match-card.finished{border-left:3px solid var(--green)}
.match-card.live{border-left:3px solid var(--red);animation:livePulse 2s infinite}
.match-card.upcoming{border-left:3px solid var(--text-muted)}
@keyframes livePulse{0%,100%{opacity:1}50%{opacity:.7}}
.match-row{display:flex;align-items:center;gap:.5rem}
.match-teams{flex:1;display:flex;align-items:center;justify-content:space-between}
.match-team{display:flex;align-items:center;gap:.4rem;flex:1}
.match-team.home{justify-content:flex-end;text-align:right}
.match-team.away{justify-content:flex-start}
.match-team-name{font-weight:600;font-size:.9rem;white-space:nowrap}
.match-team-flag{font-size:1.2rem}
.match-score{font-size:1.3rem;font-weight:800;color:var(--accent);min-width:60px;text-align:center;padding:0 .5rem}
.match-meta{display:flex;justify-content:space-between;align-items:center;margin-top:.3rem;font-size:.7rem;color:var(--text-muted)}
.match-group{background:rgba(0,212,255,.1);color:var(--accent);padding:.1rem .4rem;border-radius:10px;font-weight:600;font-size:.65rem}
.match-status{font-weight:600}
.match-status.finished{color:var(--green)}
.match-status.live{color:var(--red)}
.match-status.upcoming{color:var(--text-muted)}
.match-venue{font-size:.65rem;color:var(--text-muted)}
.match-scorers{font-size:.7rem;color:var(--text-muted);margin-top:.3rem;padding-top:.3rem;border-top:1px solid rgba(255,255,255,.04)}
.schedule-filter{margin-bottom:1rem;display:flex;gap:.3rem;flex-wrap:wrap}

.skeleton-card{background:var(--surface);border-radius:var(--radius);min-height:300px}
.skel{background:linear-gradient(90deg,#1e1e3a 25%,#2a2a4a 50%,#1e1e3a 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.message{text-align:center;padding:3rem 1rem;color:var(--text-muted)}
.message .icon{font-size:3rem;margin-bottom:1rem}
.footer{text-align:center;padding:1.5rem 1rem;color:var(--text-muted);font-size:.75rem;border-top:1px solid #1a1a2e}
.footer a{color:var(--accent)}
</style>
</head>
<body>
<div class="lang-toggle">

</div>

<div class="tab-content" id="tab-groups">

function playerName(n){return currentLang==='zh'?(PLAYER_CN[n]||n):n}

function toChinaTime(localDate){
  if(!localDate)return'';
  const[datePart,timePart]=localDate.split(' ');
  if(!datePart||!timePart)return localDate;
  const[mm,dd,yyyy]=datePart.split('/');
  const[hh,min]=timePart.split(':');
  const d=new Date(Date.UTC(parseInt(yyyy),parseInt(mm)-1,parseInt(dd),parseInt(hh),parseInt(min)));
  d.setUTCHours(d.getUTCHours()+8);
  const ch=d.getUTCMonth()+1;const cd=d.getUTCDate();const cy=d.getUTCFullYear();
  const chh=String(d.getUTCHours()).padStart(2,'0');const cmm=String(d.getUTCMinutes()).padStart(2,'0');
  return `${cy}-${String(ch).padStart(2,'0')}-${String(cd).padStart(2,'0')} ${chh}:${cmm}`;
}

function parseScorers(s){if(!s||s==='null')return[];const r=[],c=s.replace(/[{}]/g,''),rx=/"([^"]+)"/g;let m;while((m=rx.exec(c))!==null){const sc=m[1],ip=sc.toLowerCase().includes('(p)'),io=sc.toLowerCase().includes('(og)');let n=sc.replace(/\s*\d+.*$/,'').replace(/\s*\(p\)\s*/gi,'').replace(/\s*\(og\)\s*/gi,'').trim();if(n&&!io)r.push({name:n,isPenalty:ip})}return r}

async function fetchPlayerImage(name){if(imageCache[name]!==undefined)return imageCache[name];try{const sn=NAME_MAP[name]||name;const r=await fetch(`${THUMBS_API}${encodeURIComponent(sn)}`);if(!r.ok){imageCache[name]=null;return null}const d=await r.json();const p=d.player||[];if(p.length>0){const u=p[0].strCutout||p[0].strThumb||null;imageCache[name]=u;return u}const pts=sn.split(' ');if(pts.length>1){const r2=await fetch(`${THUMBS_API}${encodeURIComponent(pts[pts.length-1])}`);if(r2.ok){const d2=await r2.json();if(d2.player?.length>0){const u=d2.player[0].strCutout||d2.player[0].strThumb||null;imageCache[name]=u;return u}}}imageCache[name]=null;return null}catch{imageCache[name]=null;return null}}

let allPlayers=[],activeTeam="ALL",searchTerm="",groupsData=[],teamsMap={},stadiumsMap={},allGames=[],scheduleFilter="all";

async function fetchAll(){
  const[gamesRes,groupsRes,teamsRes,stadiumsRes]=await Promise.all([
    fetch(WC_API).then(r=>r.json()),
    fetch(GROUPS_API).then(r=>r.json()),
    fetch(TEAMS_API).then(r=>r.json()),
    fetch(STADIUMS_API).then(r=>r.json())
  ]);
  const games=gamesRes.games||[];
  groupsData=groupsRes.groups||[];
  const teams=Array.isArray(teamsRes)?teamsRes:(teamsRes.teams||[]);
  const stadiums=Array.isArray(stadiumsRes)?stadiumsRes:(stadiumsRes.stadiums||[]);
  teamsMap={};teams.forEach(t=>{teamsMap[t.id]={name:t.name_en,group:t.groups,code:t.fifa_code}});
  stadiumsMap={};stadiums.forEach(s=>{stadiumsMap[s.id]={name:s.name_en,city:s.city_en,country:s.country_en,capacity:s.capacity}});
  allGames=games;
  
  const players={};let totalGoals=0,finishedCount=0;
  for(const g of games){
    const h=g.home_team_name_en||'',a=g.away_team_name_en||'';
    if((g.finished||'').toUpperCase()==='TRUE')finishedCount++;
    for(const s of parseScorers(g.home_scorers)){totalGoals++;if(!players[s.name])players[s.name]={name:s.name,team:h,goals:0,penalties:0};players[s.name].goals++;if(s.isPenalty)players[s.name].penalties++}
    for(const s of parseScorers(g.away_scorers)){totalGoals++;if(!players[s.name])players[s.name]={name:s.name,team:a,goals:0,penalties:0};players[s.name].goals++;if(s.isPenalty)players[s.name].penalties++}
  }
  const pl=Object.values(players).sort((a,b)=>b.goals-a.goals||b.penalties-a.penalties);
  return{players:pl,stats:{totalMatches:games.length,finishedMatches:finishedCount,totalGoals,totalScorers:pl.length}};
}

    const tc=TEAM_COLORS[p.team]||'#1a1a2e',flag=TEAM_FLAGS[p.team]||'⚽',img=imageCache[p.name];
    const pen=p.penalties>0?`<div class="player-meta">${t('pen_label',{n:p.penalties})}</div>`:'';
    return`<article class="card" style="--card-accent:${tc};--team-color:${tc}">
      <div class="player-image-wrap" style="--team-color:${tc}">
        <div class="player-number-bg">${p.goals}</div>
        <div class="player-silhouette" style="color:${tc}"><svg><use href="#silhouette-player"/></svg></div>
        ${img?`<img class="player-photo" src="${img}" alt="${p.name}" loading="lazy" onerror="this.style.display='none'">`:''}

      </div>
      <div class="card-body"><div class="card-top"><div>
        <div class="player-name">${playerName(p.name)}</div>
        <div class="player-team">${teamName(p.team)} ${FIFA_RANK[p.team]?`<span class="ranking-badge ${FIFA_RANK[p.team]<=10?'ranking-top10':FIFA_RANK[p.team]<=20?'ranking-top20':'ranking-other'}">#${FIFA_RANK[p.team]}</span>`:''}</div>

      </div></article>`;
  }).join("");
}

function renderGroups(){
  const c=document.getElementById("groups-container");
  const sg=groupsData.slice().sort((a,b)=>a.name.localeCompare(b.name));
  c.innerHTML=sg.map(g=>{
    const teams=g.teams.slice().sort((a,b)=>{const pd=parseInt(b.pts)-parseInt(a.pts);if(pd!==0)return pd;const gd=(parseInt(b.gf)-parseInt(b.ga))-(parseInt(a.gf)-parseInt(a.ga));if(gd!==0)return gd;return parseInt(b.gf)-parseInt(a.gf)});
    return`<div class="group-section">
      <div class="group-title">🏆 ${t('group')} ${g.name}</div>
      <table class="group-table"><thead><tr>
        <th>${t('rank')}</th><th>${t('team')}</th><th>${t('pts')}</th>
        <th>${t('mp')}</th><th>${t('w')}</th><th>${t('d')}</th><th>${t('l')}</th>
        <th>${t('gf')}</th><th>${t('ga')}</th><th>${t('gd')}</th>
      </tr></thead><tbody>${teams.map((t2,i)=>{
        const info=teamsMap[t2.team_id]||{};const name=teamName(info.name||'');const flag=TEAM_FLAGS[info.name]||'🏳️';
        const rank=FIFA_RANK[info.name];const gd=parseInt(t2.gf)-parseInt(t2.ga);
        const gdStr=gd>0?`+${gd}`:gd===0?'0':`${gd}`;const gdClass=gd>0?'gd-pos':gd<0?'gd-neg':'';
        const rb=rank?`<span class="ranking-badge ${rank<=10?'ranking-top10':rank<=20?'ranking-top20':'ranking-other'}" style="margin-left:.3rem;font-size:.6rem">#${rank}</span>`:'';
        return`<tr><td style="color:var(--text-muted);font-weight:600">${i+1}</td><td><div class="team-cell"><span class="team-flag">${flag}</span>${name}${rb}</div></td><td class="pts">${t2.pts}</td><td>${t2.mp}</td><td>${t2.w}</td><td>${t2.d}</td><td>${t2.l}</td><td>${t2.gf}</td><td>${t2.ga}</td><td class="${gdClass}">${gdStr}</td></tr>`;
      }).join('')}</tbody></table></div>`;
  }).join('');
}

function renderSchedule(){
  const fc=document.getElementById("schedule-container");
  const ff=document.getElementById("schedule-filter");
  
  ff.innerHTML=[
    {key:'all',label:t('sch_all')},
    {key:'upcoming',label:t('sch_upcoming')},
    {key:'live',label:t('sch_live')},
    {key:'finished',label:t('sch_finished')}
  ].map(f=>`<button class="filter-btn ${scheduleFilter===f.key?'active':''}" onclick="setScheduleFilter('${f.key}')">${f.label}</button>`).join('');

  let games=allGames;
  if(scheduleFilter==='finished')games=games.filter(g=>(g.finished||'').toUpperCase()==='TRUE');
  else if(scheduleFilter==='live')games=games.filter(g=>(g.time_elapsed||'').toLowerCase()==='live');
  else if(scheduleFilter==='upcoming')games=games.filter(g=>(g.finished||'').toUpperCase()!=='TRUE'&&(g.time_elapsed||'').toLowerCase()!=='live');

  const grouped={};
  games.forEach(g=>{
    const isUpcoming=(g.finished||'').toUpperCase()!=='TRUE'&&(g.time_elapsed||'').toLowerCase()!=='live';
    let date;
    if(isUpcoming){
      const ct=toChinaTime(g.local_date);
      date=ct.split(' ')[0]||'Unknown';
    }else{
      date=(g.local_date||'').split(' ')[0]||'Unknown';
    }
    if(!grouped[date])grouped[date]=[];
    grouped[date].push(g);
  });

  const sortedDates=Object.keys(grouped).sort((a,b)=>{
    const da=a.split('/');const db=b.split('/');
    const d1=new Date(da[2],da[0]-1,da[1]);
    const d2=new Date(db[2],db[0]-1,db[1]);
    if(scheduleFilter==='finished')return d2-d1;
    if(scheduleFilter==='all')return d2-d1;
    return d1-d2;
  });

  if(!sortedDates.length){fc.innerHTML=`<div class="message"><div class="icon">📅</div><h3>${currentLang==='zh'?'暂无比赛':'No matches'}</h3></div>`;return}

  fc.innerHTML=sortedDates.map(date=>{
    const parts=date.split('/');
    const dateObj=new Date(parts[2],parts[0]-1,parts[1]);
    const weekday=currentLang==='zh'?['周日','周一','周二','周三','周四','周五','周六'][dateObj.getDay()]:['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][dateObj.getDay()];
    const dateStr=currentLang==='zh'?`${parts[2]}年${parts[0]}月${parts[1]}日 ${weekday}`:`${['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(parts[0])]} ${parseInt(parts[1])}, ${parts[2]} (${weekday})`;
    
    const matchCards=grouped[date].map(g=>{
      const isFinished=(g.finished||'').toUpperCase()==='TRUE';
      const isLive=(g.time_elapsed||'').toLowerCase()==='live';
      const statusClass=isFinished?'finished':isLive?'live':'upcoming';
      const statusText=isFinished?t('sch_finished'):isLive?'🔴 LIVE':t('sch_upcoming');
      const time=(g.local_date||'').split(' ')[1]||'';
      const homeName=teamName(g.home_team_name_en||'');
      const awayName=teamName(g.away_team_name_en||'');
      const homeFlag=TEAM_FLAGS[g.home_team_name_en]||'🏳️';
      const awayFlag=TEAM_FLAGS[g.away_team_name_en]||'🏳️';
      const stadium=stadiumsMap[g.stadium_id];
      const stadiumText=stadium?stadiumName(stadium.name):'';
      const cityText=stadium?stadium.city:'';
      const groupLabel=g.group?`小组${g.group}`:'';
      const typeLabel=g.type==='knockout'?'淘汰赛':g.type==='final'?'决赛':'';
      const score=isFinished||isLive?`${g.home_score || 0} - ${g.away_score || 0}`:toChinaTime(g.local_date).split(' ')[1]||time;
      const homeScorers=parseScorers(g.home_scorers);
      const awayScorers=parseScorers(g.away_scorers);
      let scorersHtml='';
      if(isFinished&&(homeScorers.length||awayScorers.length)){
        const allScorers=[...homeScorers.map(s=>`${playerName(s.name)}${s.isPenalty?'(p)':''}`),...awayScorers.map(s=>`${playerName(s.name)}${s.isPenalty?'(p)':''}`)];
        scorersHtml=`<div class="match-scorers">⚽ ${allScorers.join(', ')}</div>`;
      }
      
      return`<div class="match-card ${statusClass}">
        <div class="match-row">
          <div class="match-team home"><span class="match-team-name">${homeName}</span><span class="match-team-flag">${homeFlag}</span></div>
          <div class="match-score">${score}</div>
          <div class="match-team away"><span class="match-team-flag">${awayFlag}</span><span class="match-team-name">${awayName}</span></div>
        </div>
        <div class="match-meta">
          <div>${groupLabel?`<span class="match-group">${groupLabel}</span> `:''}${typeLabel?`<span class="match-group">${typeLabel}</span> `:''}<span class="match-status ${statusClass}">${statusText}</span></div>
          <div>${stadiumText?`<span class="match-venue">🏟️ ${stadiumText}${cityText?' · '+cityText:''}</span>`:''}</div>
        </div>
        ${scorersHtml}
      </div>`;
    }).join('');

    return`<div class="schedule-date">
      <div class="schedule-date-header"><span class="date-icon">📅</span>${dateStr}<span style="margin-left:auto;font-size:.75rem;color:var(--text-muted)">${grouped[date].length} ${currentLang==='zh'?'场':'matches'}</span></div>
      ${matchCards}
    </div>`;
  }).join('');
}

function currentFiltered(){let l=allPlayers;if(activeTeam!=='ALL')l=l.filter(p=>p.team===activeTeam);if(searchTerm){const q=searchTerm.toLowerCase();l=l.filter(p=>p.name.toLowerCase().includes(q)||p.team.toLowerCase().includes(q)||(TEAM_CN[p.team]||'').includes(q)||(PLAYER_CN[p.name]||'').includes(q))}return l}

  currentLang=lang;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang));

  document.querySelectorAll('[data-i18n]').forEach(el=>{el.textContent=t(el.dataset.i18n)});
  document.getElementById('footer').innerHTML=`${t('footer_data')}: <a href="https://worldcup26.ir" target="_blank">World Cup 2026 API</a> · ${t('footer_img')}: <a href="https://www.thesportsdb.com" target="_blank">TheSportsDB</a> · ${t('footer_update')}`;
  if(allPlayers.length){renderCards(currentFiltered());renderTeamFilters();renderGroups();renderSchedule()}
}

function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
}

document.getElementById("team-filters").addEventListener("click",e=>{if(!e.target.matches(".filter-btn"))return;document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));e.target.classList.add("active");activeTeam=e.target.dataset.team;renderCards(currentFiltered())});
document.getElementById("search").addEventListener("input",e=>{searchTerm=e.target.value.trim();renderCards(currentFiltered())});

let refreshTimer=null;
async function loadData(){
  try{
    const{players,stats}=await fetchAll();
    allPlayers=players;renderStats(stats);renderTeamFilters();
    await Promise.all(players.slice(0,20).map(p=>fetchPlayerImage(p.name)));
    renderCards(players);renderGroups();renderSchedule();
    const now=new Date().toLocaleTimeString(currentLang==='zh'?'zh-CN':'en-US');
    document.getElementById('source-info').innerHTML=`<span class="live-dot"></span>${t('matches_done',{cur:stats.finishedMatches,total:stats.totalMatches})} · ${t('updated_at',{time:now})}`;
    (async()=>{for(const p of players.slice(20))await fetchPlayerImage(p.name);renderCards(players)})();
  }catch(err){document.getElementById('source-info').innerHTML=`<span style="color:var(--red)">⚠</span> ${t('api_error')}: ${err.message}`}
}

(async function(){await loadData();refreshTimer=setInterval(loadData,REFRESH_INTERVAL)})();
</script>
</body>
</html>
